# CI: GitHub Actions runs `dbt test` on every push/PR touching this folder (see .github/workflows/dbt_ci.yml). Fixed profiles.yml generation in cd92e3a. DBT_CI schema created in Snowflake.
name: 'omnicart'
version: '1.0.0'
config-version: 2

profile: 'omnicart'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  omnicart:
    staging:
      +materialized: view
    intermediate:
      +materialized: view
    marts:
      +materialized: table
