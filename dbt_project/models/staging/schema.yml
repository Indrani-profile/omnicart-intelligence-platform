version: 2

models:
  - name: stg_gold__daily_delivery_summary
    description: Daily aggregated delivery metrics joined with weather. 365 rows, one per calendar day of 2023.
    columns:
      - name: pickup_date
        tests:
          - unique
          - not_null
      - name: trip_count
        tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                inclusive: true
      - name: total_revenue
        tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                inclusive: true

  - name: stg_gold__delivery_sla
    description: Daily on-time/delayed trip breakdown by pickup location. 80,752 rows.
    columns:
      - name: pickup_date
        tests:
          - not_null
      - name: pickup_location_id
        tests:
          - not_null
      - name: total_trips
        tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                inclusive: true
      - name: on_time_rate
        tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 1
                inclusive: true

  - name: stg_gold__weather_delay_impact
    description: Daily on-time/delayed trip breakdown by weather severity tier. 365 rows.
    columns:
      - name: pickup_date
        tests:
          - not_null
      - name: weather_severity
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['Clear', 'Rain', 'Snow', 'Extreme Cold']
      - name: on_time_rate
        tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 1
                inclusive: true

  - name: stg_gold__review_summary
    description: Review stats by category and month. 1,456 rows.
    columns:
      - name: category
        tests:
          - not_null
      - name: review_month
        tests:
          - not_null
      - name: avg_rating
        tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 1
                max_value: 5
                inclusive: true
      - name: verified_purchase_pct
        tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 1
                inclusive: true

  - name: stg_gold__order_status_current
    description: One row per order, current lifecycle status. 250 rows.
    columns:
      - name: order_id
        tests:
          - unique
          - not_null
      - name: current_status
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['delivered', 'cancelled']
      - name: order_value
        tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                inclusive: true

  - name: stg_gold__demand_forecast
    description: Daily trip_count actuals and Prophet forecast, 395 rows (365 historical + 30 future).
    columns:
      - name: forecast_date
        tests:
          - unique
          - not_null
      - name: predicted_trip_count
        tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                inclusive: true
      - name: is_future
        tests:
          - not_null
